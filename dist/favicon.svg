<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#F3E5AB" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
  </defs>
  <!-- Background circle for contrast on light/dark tabs -->
  <circle cx="50" cy="50" r="48" fill="#050505" stroke="url(#gold-grad)" stroke-width="2" />
  <!-- Stylized Luxury Geometric Monogram 'DM' -->
  <g transform="translate(10, 10) scale(0.8)">
    <!-- 'D' shape represented by left pillar and curve -->
    <path d="M 25 15 L 25 85 L 33 85 L 33 15 Z" fill="url(#gold-grad)" />
    <path d="M 33 15 C 60 15, 70 30, 70 50 C 70 70, 60 85, 33 85 L 33 75 C 52 75, 60 65, 60 50 C 60 35, 52 25, 33 25 Z" fill="url(#gold-grad)" />
    
    <!-- 'M' shape interweaving inside the D or next to it -->
    <!-- We make an elegant abstract 'M' on the right side -->
    <path d="M 45 35 L 55 55 L 65 35 L 75 35 L 75 85 L 67 85 L 67 48 L 59 65 L 51 65 L 43 48 L 43 85 L 35 85 L 35 35 Z" fill="url(#gold-grad)" opacity="0.9" />
  </g>
  <!-- Inner geometric diamonds for luxury branding details -->
  <polygon points="50,18 53,24 50,30 47,24" fill="url(#gold-grad)" />
  <polygon points="50,70 53,76 50,82 47,76" fill="url(#gold-grad)" />
</svg>
